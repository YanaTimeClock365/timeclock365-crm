<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TimeClock 365 — CRM</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #f5f7fa; color: #1C1C1D; }

  /* Header */
  .header {
    background: #3479E9;
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header h1 { color: #fff; font-size: 18px; }
  .header span { color: rgba(255,255,255,0.7); font-size: 13px; }

  /* Stats */
  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    padding: 24px 32px 0;
  }
  .stat {
    background: #fff;
    border-radius: 8px;
    padding: 20px;
    border-left: 4px solid #e0e0e0;
  }
  .stat.hot { border-color: #D92D20; }
  .stat.warm { border-color: #FF981B; }
  .stat.converted { border-color: #12B76A; }
  .stat.total { border-color: #3479E9; }
  .stat-number { font-size: 32px; font-weight: 700; }
  .stat-label { font-size: 13px; color: #888; margin-top: 4px; }

  /* Table */
  .table-wrap {
    margin: 24px 32px;
    background: #fff;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .table-header {
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid #eee;
  }
  .table-header h2 { font-size: 15px; }
  .btn-export {
    background: #3479E9;
    color: #fff;
    border: none;
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
  }
  table { width: 100%; border-collapse: collapse; }
  th {
    text-align: left;
    padding: 10px 16px;
    font-size: 12px;
    text-transform: uppercase;
    color: #888;
    border-bottom: 1px solid #eee;
    background: #fafafa;
  }
  td {
    padding: 12px 16px;
    font-size: 14px;
    border-bottom: 1px solid #f0f0f0;
    vertical-align: top;
  }
  tr:hover td { background: #f9fbff; }

  /* Status badges */
  .badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
  }
  .badge-new      { background: #EEF4FF; color: #3479E9; }
  .badge-sent1    { background: #FFF6E0; color: #FF981B; }
  .badge-sent2    { background: #FFF0E0; color: #E87A00; }
  .badge-sent3    { background: #F0FFF6; color: #12B76A; }
  .badge-done     { background: #E8F8EE; color: #0D8A4A; }
  .badge-hot      { background: #FFF0F0; color: #D92D20; }

  /* Email dots */
  .email-dots { display: flex; gap: 4px; }
  .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #ddd;
  }
  .dot.sent { background: #12B76A; }

  /* Source tag */
  .source-tag {
    font-size: 11px;
    background: #f0f0f0;
    padding: 2px 8px;
    border-radius: 4px;
    color: #555;
  }

  /* Status select */
  select {
    border: 1px solid #ddd;
    border-radius: 4px;
    padding: 4px 8px;
    font-size: 12px;
    background: #fff;
    cursor: pointer;
  }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: #888;
  }
  .empty h3 { font-size: 18px; margin-bottom: 8px; color: #555; }

  /* Loading */
  .loading { text-align: center; padding: 40px; color: #888; }

  /* Notes input */
  .note-input {
    border: 1px solid #ddd;
    border-radius: 4px;
    padding: 4px 8px;
    font-size: 12px;
    width: 160px;
  }
  .btn-save {
    background: #f0f0f0;
    border: none;
    padding: 4px 10px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
    margin-left: 4px;
  }
  .btn-save:hover { background: #e0e0e0; }
</style>
</head>
<body>

<div class="header">
  <h1>TimeClock 365</h1>
  <div style="display:flex;gap:8px;align-items:center;">
    <a href="/" style="color:#fff;background:rgba(255,255,255,0.25);padding:7px 16px;border-radius:6px;text-decoration:none;font-size:13px;font-weight:600;">👥 Лиды / CRM</a>
    <a href="/approvals-page" style="color:rgba(255,255,255,0.85);background:rgba(255,255,255,0.12);padding:7px 16px;border-radius:6px;text-decoration:none;font-size:13px;" id="approvals-link">✅ На согласование <span id="pending-count" style="background:#FF981B;color:#fff;border-radius:10px;padding:1px 7px;font-size:11px;margin-left:4px;"></span></a>
    <span id="lastUpdate" style="color:rgba(255,255,255,0.6);font-size:12px;margin-left:8px;"></span>
  </div>
</div>

<!-- Статистика -->
<div class="stats">
  <div class="stat total">
    <div class="stat-number" id="stat-total">—</div>
    <div class="stat-label">Всего лидов</div>
  </div>
  <div class="stat hot">
    <div class="stat-number" id="stat-new">—</div>
    <div class="stat-label">Новых (сегодня)</div>
  </div>
  <div class="stat warm">
    <div class="stat-number" id="stat-active">—</div>
    <div class="stat-label">В цепочке</div>
  </div>
  <div class="stat converted">
    <div class="stat-number" id="stat-done">—</div>
    <div class="stat-label">Завершили цепочку</div>
  </div>
</div>

<!-- Таблица лидов -->
<div class="table-wrap">
  <div class="table-header">
    <h2>Все лиды</h2>
    <button class="btn-export" onclick="exportCSV()">Экспорт CSV</button>
  </div>
  <div id="tableContainer"><div class="loading">Загрузка...</div></div>
</div>

<script>
let allLeads = [];

// Загружаем счётчик согласований
async function loadPendingCount() {
  try {
    const res = await fetch('/approvals');
    const data = await res.json();
    const count = [...(data.posts||[]), ...(data.landings||[]), ...(data.emails||[])]
      .filter(i => i.status === 'pending').length;
    const el = document.getElementById('pending-count');
    if (el) el.textContent = count > 0 ? count : '';
  } catch(e) {}
}

// Загружаем лиды
async function loadLeads() {
  try {
    const res = await fetch('/subscribers');
    const data = await res.json();
    allLeads = data;
    renderTable(data);
    renderStats(data);
    document.getElementById('lastUpdate').textContent =
      'Обновлено: ' + new Date().toLocaleTimeString('ru');
  } catch(e) {
    document.getElementById('tableContainer').innerHTML =
      '<div class="empty"><h3>Ошибка загрузки</h3><p>Убедись что сервер запущен</p></div>';
  }
}

function renderStats(leads) {
  const today = new Date().toISOString().slice(0, 10);
  document.getElementById('stat-total').textContent = leads.length;
  document.getElementById('stat-new').textContent =
    leads.filter(l => l.subscribedAt && l.subscribedAt.startsWith(today)).length;
  document.getElementById('stat-active').textContent =
    leads.filter(l => !l.completed && l.email1Sent).length;
  document.getElementById('stat-done').textContent =
    leads.filter(l => l.completed).length;
}

function getStatusBadge(lead) {
  const status = lead.status || 'new';
  const map = {
    new:       ['badge-new',  'Новый'],
    contacted: ['badge-sent1','Contacted'],
    hot:       ['badge-hot',  '🔥 HOT'],
    demo:      ['badge-sent2','Записан на демо'],
    converted: ['badge-done', '✓ Клиент'],
    lost:      ['',           'Отказ'],
  };
  const [cls, label] = map[status] || ['badge-new', status];
  return `<span class="badge ${cls}">${label}</span>`;
}

function getEmailDots(lead) {
  return `<div class="email-dots">
    <div class="dot ${lead.email1Sent ? 'sent' : ''}" title="Email 1${lead.email1Sent ? ': ' + lead.email1Sent.slice(0,10) : ': не отправлен'}"></div>
    <div class="dot ${lead.email2Sent ? 'sent' : ''}" title="Email 2${lead.email2Sent ? ': ' + lead.email2Sent.slice(0,10) : ': не отправлен'}"></div>
    <div class="dot ${lead.email3Sent ? 'sent' : ''}" title="Email 3${lead.email3Sent ? ': ' + lead.email3Sent.slice(0,10) : ': не отправлен'}"></div>
  </div>`;
}

function getNextStep(lead) {
  if (lead.status === 'converted') return '—';
  if (lead.status === 'lost') return '—';
  if (!lead.email1Sent) return 'Email 1 (сегодня)';
  if (!lead.email2Sent) {
    const d1 = new Date(lead.subscribedAt);
    const daysDiff = Math.floor((Date.now() - d1) / 86400000);
    const daysLeft = Math.max(0, 1 - daysDiff);
    return daysLeft > 0 ? `Email 2 (через ${daysLeft} д.)` : 'Email 2 (сегодня)';
  }
  if (!lead.email3Sent) {
    const d1 = new Date(lead.subscribedAt);
    const daysDiff = Math.floor((Date.now() - d1) / 86400000);
    const daysLeft = Math.max(0, 3 - daysDiff);
    return daysLeft > 0 ? `Email 3 (через ${daysLeft} д.)` : 'Email 3 (сегодня)';
  }
  if (lead.status !== 'converted') return 'Позвонить / закрыть';
  return '—';
}

function renderTable(leads) {
  if (leads.length === 0) {
    document.getElementById('tableContainer').innerHTML = `
      <div class="empty">
        <h3>Лидов пока нет</h3>
        <p>Как только кто-то заполнит форму на лендинге — он появится здесь</p>
      </div>`;
    return;
  }

  const rows = leads.map((lead, i) => `
    <tr>
      <td style="color:#888;font-size:12px;">#${i+1}</td>
      <td><strong>${lead.name || '—'}</strong></td>
      <td style="color:#3479E9;">${lead.email}</td>
      <td><span class="source-tag">${lead.source || 'лендинг'}</span></td>
      <td style="color:#888;font-size:13px;">${lead.subscribedAt ? lead.subscribedAt.slice(0,10) : '—'}</td>
      <td>
        <select onchange="updateStatus('${lead.email}', this.value)">
          <option value="new"       ${(lead.status||'new')==='new'       ? 'selected':''}>Новый</option>
          <option value="contacted" ${lead.status==='contacted' ? 'selected':''}>Contacted</option>
          <option value="hot"       ${lead.status==='hot'       ? 'selected':''}>🔥 HOT</option>
          <option value="demo"      ${lead.status==='demo'      ? 'selected':''}>Записан на демо</option>
          <option value="converted" ${lead.status==='converted' ? 'selected':''}>✓ Клиент</option>
          <option value="lost"      ${lead.status==='lost'      ? 'selected':''}>Отказ</option>
        </select>
      </td>
      <td>${getEmailDots(lead)}</td>
      <td style="font-size:13px;color:#555;">${getNextStep(lead)}</td>
      <td>
        <input class="note-input" type="text" placeholder="Заметка..."
          value="${lead.notes || ''}" id="note-${lead.email.replace('@','_').replace('.','_')}">
        <button class="btn-save" onclick="saveNote('${lead.email}')">✓</button>
      </td>
    </tr>
  `).join('');

  document.getElementById('tableContainer').innerHTML = `
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Имя</th>
          <th>Email</th>
          <th>Источник</th>
          <th>Дата</th>
          <th>Статус</th>
          <th>Письма</th>
          <th>След. шаг</th>
          <th>Заметки</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>`;
}

async function updateStatus(email, status) {
  await fetch('/update-lead', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, status })
  });
  loadLeads();
}

async function saveNote(email) {
  const key = email.replace('@','_').replace('.','_');
  const notes = document.getElementById('note-' + key)?.value || '';
  await fetch('/update-lead', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, notes })
  });
}

function exportCSV() {
  const headers = ['Имя','Email','Источник','Дата','Статус','Email1','Email2','Email3','Заметки'];
  const rows = allLeads.map(l => [
    l.name, l.email, l.source||'лендинг',
    l.subscribedAt?.slice(0,10),
    l.status||'new',
    l.email1Sent ? '✓' : '',
    l.email2Sent ? '✓' : '',
    l.email3Sent ? '✓' : '',
    l.notes||''
  ]);
  const csv = [headers, ...rows].map(r => r.map(v => `"${v||''}"`).join(',')).join('\n');
  const blob = new Blob(['\ufeff'+csv], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `leads-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

// Загружаем сразу и обновляем каждые 30 секунд
loadLeads();
loadPendingCount();
setInterval(loadLeads, 30000);
setInterval(loadPendingCount, 30000);
</script>
</body>
</html>
