<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TimeClock 365 — Посты на согласование</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: #f0f4fb; color: #1C1C1D; min-height: 100vh; }

.header {
  background: #0A66C2;
  padding: 18px 32px;
  display: flex;
  align-items: center;
  gap: 16px;
}
.header h1 { color: #fff; font-size: 20px; font-weight: 700; }
.header p  { color: rgba(255,255,255,0.8); font-size: 13px; margin-top: 2px; }

.container { max-width: 780px; margin: 0 auto; padding: 32px 16px 64px; }

.empty {
  text-align: center; padding: 80px 20px; color: #888;
}
.empty h2 { font-size: 22px; margin-bottom: 8px; color: #555; }

/* Post card */
.post-card {
  background: #fff;
  border-radius: 12px;
  border: 1px solid #e0e8f5;
  margin-bottom: 24px;
  overflow: hidden;
  box-shadow: 0 2px 8px rgba(10,102,194,0.06);
  transition: box-shadow 0.2s;
}
.post-card:hover { box-shadow: 0 4px 16px rgba(10,102,194,0.12); }
.post-card.done { opacity: 0.55; border-color: #c8e6c9; }

.card-top {
  background: #f7f9ff;
  border-bottom: 1px solid #e8eef8;
  padding: 14px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.card-num { font-weight: 700; font-size: 13px; color: #0A66C2; }
.card-date { font-size: 12px; color: #aaa; }

.badge-new  { background: #fff3cd; color: #856404; border: 1px solid #ffc107; border-radius: 20px; padding: 3px 10px; font-size: 12px; font-weight: 600; }
.badge-ok   { background: #d4edda; color: #155724; border: 1px solid #28a745; border-radius: 20px; padding: 3px 10px; font-size: 12px; font-weight: 600; }
.badge-edit { background: #e8f0ff; color: #0A66C2; border: 1px solid #90b8f8; border-radius: 20px; padding: 3px 10px; font-size: 12px; font-weight: 600; }
.badge-sched { background: #e8f5e9; color: #2e7d32; border: 1px solid #81c784; border-radius: 20px; padding: 3px 10px; font-size: 12px; font-weight: 600; }

.day-header {
  font-size: 13px; font-weight: 700; color: #0A66C2;
  text-transform: uppercase; letter-spacing: 1px;
  margin: 28px 0 10px; padding: 8px 14px;
  background: #e8f0ff; border-radius: 8px;
  display: flex; align-items: center; gap: 8px;
}
.slot-time {
  display: inline-block; background: #0A66C2; color: #fff;
  border-radius: 12px; padding: 2px 10px; font-size: 12px;
  font-weight: 700; letter-spacing: 0;
}

.post-text {
  padding: 20px;
  font-size: 15px;
  line-height: 1.7;
  color: #222;
  white-space: pre-wrap;
  word-break: break-word;
  min-height: 80px;
  border-radius: 0;
  outline: none;
}
.post-text[contenteditable="true"] {
  background: #f7f9ff;
  border-top: 2px solid #0A66C2;
  cursor: text;
}

.card-actions {
  padding: 16px 20px 20px;
  border-top: 1px solid #f0f0f0;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.edit-row {
  display: flex;
  gap: 8px;
}

.btn {
  padding: 9px 18px;
  border-radius: 7px;
  border: none;
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
  transition: background 0.15s, opacity 0.15s;
}
.btn:disabled { opacity: 0.5; cursor: default; }
.btn-edit  { background: #f0f4ff; color: #0A66C2; border: 1px solid #c0d4f8; }
.btn-edit:hover { background: #dce8ff; }
.btn-save  { background: #fff3e0; color: #e65c00; border: 1px solid #ffcc80; display: none; }
.btn-save:hover { background: #ffe0b2; }

.media-row {
  display: flex;
  align-items: center;
  gap: 10px;
}
.media-label { font-size: 12px; font-weight: 600; color: #666; white-space: nowrap; }
.media-input {
  flex: 1;
  padding: 9px 12px;
  border: 1px solid #dce4f0;
  border-radius: 7px;
  font-size: 13px;
  color: #333;
  background: #fafbff;
}
.media-input:focus { outline: none; border-color: #0A66C2; background: #fff; }
.media-input::placeholder { color: #bbb; }

.btn-approve {
  background: #0A66C2;
  color: #fff;
  padding: 14px;
  border-radius: 8px;
  width: 100%;
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 0.2px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: background 0.15s;
}
.btn-approve:hover:not(:disabled) { background: #004da6; }
.btn-approve:disabled { background: #90b8f8; cursor: default; }


.toast {
  position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
  background: #1C1C1D; color: #fff; padding: 12px 24px;
  border-radius: 8px; font-size: 14px; font-weight: 600;
  opacity: 0; pointer-events: none; transition: opacity 0.3s;
  z-index: 9999; white-space: nowrap;
}
.toast.show { opacity: 1; }

.section-title {
  font-size: 13px; font-weight: 700; color: #888;
  text-transform: uppercase; letter-spacing: 1px;
  margin: 32px 0 12px;
}
.done-card {
  background: #fff; border-radius: 10px; border: 1px solid #e8f5e9;
  padding: 14px 18px; margin-bottom: 10px;
  display: flex; align-items: center; justify-content: space-between;
}
.done-title { font-size: 14px; font-weight: 600; color: #555; }
.done-meta  { font-size: 12px; color: #aaa; }

/* Nav tabs */
.nav-tabs {
  background: #fff;
  border-bottom: 2px solid #e0e8f5;
  display: flex;
  padding: 0 24px;
  gap: 0;
}
.nav-tab {
  padding: 14px 22px;
  cursor: pointer;
  font-size: 15px;
  font-weight: 600;
  color: #888;
  border-bottom: 3px solid transparent;
  margin-bottom: -2px;
  transition: color 0.15s;
  white-space: nowrap;
  display: flex; align-items: center; gap: 7px;
}
.nav-tab:hover { color: #0A66C2; }
.nav-tab.active { color: #0A66C2; border-bottom-color: #0A66C2; }
.nav-tab .cnt {
  background: #0A66C2; color: #fff;
  border-radius: 10px; padding: 1px 8px;
  font-size: 11px; font-weight: 700;
  display: none;
}
.nav-tab .cnt.show { display: inline-block; }

.page-section { display: none; }
.page-section.active { display: block; }

/* Report card */
.report-card {
  background: #fff; border-radius: 12px;
  border: 1px solid #e0e8f5;
  margin-bottom: 20px; overflow: hidden;
  box-shadow: 0 2px 8px rgba(10,102,194,0.05);
}
.report-card-top {
  background: #f7f9ff; border-bottom: 1px solid #e8eef8;
  padding: 14px 20px;
  display: flex; align-items: center; justify-content: space-between;
}
.report-type { font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 1px; color: #0A66C2; }
.report-date { font-size: 12px; color: #aaa; }
.report-body {
  padding: 20px; font-size: 14px; line-height: 1.8; color: #333;
  white-space: pre-wrap; max-height: 400px; overflow-y: auto;
}

/* Email card */
.email-card {
  background: #fff; border-radius: 12px;
  border: 1px solid #e0e8f5; margin-bottom: 20px; overflow: hidden;
  box-shadow: 0 2px 8px rgba(10,102,194,0.05);
}
.email-card-top {
  background: #f7f9ff; border-bottom: 1px solid #e8eef8;
  padding: 14px 20px; display: flex; align-items: center; justify-content: space-between;
}
.email-num { font-weight: 700; font-size: 13px; color: #0A66C2; }
.email-subject { font-size: 14px; font-weight: 600; color: #222; margin-top: 2px; }
.email-body { padding: 20px; font-size: 14px; line-height: 1.8; color: #333;
  white-space: pre-wrap; max-height: 360px; overflow-y: auto; }
.email-badge { background: #e8f0ff; color: #0A66C2; border: 1px solid #90b8f8;
  border-radius: 20px; padding: 3px 10px; font-size: 12px; font-weight: 600; }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>TimeClock 365</h1>
    <p>Согласование контента</p>
  </div>
</div>

<div class="nav-tabs">
  <div class="nav-tab active" onclick="switchTab('posts')">📝 Посты <span class="cnt" id="cnt-posts"></span></div>
  <div class="nav-tab" onclick="switchTab('reports')">📊 Отчёты <span class="cnt" id="cnt-reports"></span></div>
  <div class="nav-tab" onclick="switchTab('emails')">✉️ Рассылка <span class="cnt" id="cnt-emails"></span></div>
</div>

<div class="container">

  <!-- ПОСТЫ -->
  <div class="page-section active" id="section-posts">
    <div id="pending-list"></div>
    <div id="sched-section" style="display:none;">
      <div class="section-title">⏰ Запланированные</div>
      <div id="sched-list"></div>
    </div>
    <div id="done-section" style="display:none;">
      <div class="section-title">✓ Опубликованные</div>
      <div id="done-list"></div>
    </div>
  </div>

  <!-- ОТЧЁТЫ -->
  <div class="page-section" id="section-reports">
    <div id="reports-list"></div>
  </div>

  <!-- РАССЫЛКА -->
  <div class="page-section" id="section-emails">
    <div id="emails-list"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<!-- Lightbox -->
<div id="lightbox" onclick="closeLightbox()" style="
  display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85);
  z-index:99999; align-items:center; justify-content:center; cursor:zoom-out;
">
  <button onclick="closeLightbox()" style="
    position:fixed; top:16px; right:20px; background:rgba(255,255,255,0.15);
    border:none; color:#fff; font-size:28px; cursor:pointer; border-radius:50%;
    width:44px; height:44px; display:flex; align-items:center; justify-content:center;
    line-height:1;
  ">✕</button>
  <img id="lightbox-img" src="" style="
    max-width:92vw; max-height:90vh; border-radius:10px;
    box-shadow:0 8px 40px rgba(0,0,0,0.6); object-fit:contain;
  " onclick="event.stopPropagation()"/>
</div>

<script>
let data = { posts: [], reports: [], emails: [] };
let currentTab = 'posts';

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.nav-tab').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.page-section').forEach(el => el.classList.remove('active'));
  document.querySelector(`.nav-tab[onclick="switchTab('${tab}')"]`).classList.add('active');
  document.getElementById(`section-${tab}`).classList.add('active');
}

const REPORT_LABELS = {
  competitors: '📊 Конкуренты',
  seo: '🔍 SEO',
  weekly: '📅 Недельный отчёт',
  monthly: '📆 Месячный отчёт',
  landings: '🏗️ Лендинги'
};

async function load() {
  try {
    const r = await fetch('/approvals');
    const d = await r.json();
    data.posts = d.posts || [];
    // Собираем все отчёты
    data.reports = [];
    for (const type of ['competitors','seo','weekly','monthly','landings']) {
      for (const item of (d[type] || [])) {
        data.reports.push({ ...item, _type: type });
      }
    }
    data.emails = d.emails || [];
  } catch(e) {}
  render();
  updateCounts();
}

function updateCounts() {
  const pendingPosts = data.posts.filter(p => ['pending','edited'].includes(p.status)).length;
  const cntPosts = document.getElementById('cnt-posts');
  if (pendingPosts > 0) { cntPosts.textContent = pendingPosts; cntPosts.classList.add('show'); }
  else cntPosts.classList.remove('show');

  const cntReports = document.getElementById('cnt-reports');
  if (data.reports.length > 0) { cntReports.textContent = data.reports.length; cntReports.classList.add('show'); }
  else cntReports.classList.remove('show');

  const pendingEmails = data.emails.filter(e => e.status === 'pending').length;
  const cntEmails = document.getElementById('cnt-emails');
  if (pendingEmails > 0) { cntEmails.textContent = pendingEmails; cntEmails.classList.add('show'); }
  else cntEmails.classList.remove('show');
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

const DAYS_RU = ['Воскресенье','Понедельник','Вторник','Среда','Четверг','Пятница','Суббота'];
const MONTHS_RU = ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];

function formatDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr + 'T12:00:00');
  return `${DAYS_RU[d.getDay()]}, ${d.getDate()} ${MONTHS_RU[d.getMonth()]}`;
}

function slotLabel(slot) {
  if (slot === 'noon') return '12:00';
  if (slot === 'afternoon') return '16:00';
  return '';
}

function render() {
  const pending = data.posts.filter(p => ['pending','edited'].includes(p.status));
  const scheduled = data.posts.filter(p => p.status === 'scheduled');
  const done    = data.posts.filter(p => ['approved','published'].includes(p.status));

  const el = document.getElementById('pending-list');

  if (!pending.length) {
    el.innerHTML = `<div class="empty">
      <h2>Новых постов нет</h2>
      <p>Агент добавляет посты каждый понедельник в 9:00</p>
    </div>`;
  } else {
    // Группируем по дням если есть scheduledFor
    let lastDay = null;
    el.innerHTML = pending.map((post, ri) => {
      const i = data.posts.indexOf(post);
      const text = post.editedContent || post.content || '';
      const isEdited = post.status === 'edited';
      const hasSchedule = post.scheduledFor && post.slot;
      const timeLabel = slotLabel(post.slot);

      const badge = isEdited
        ? `<span class="badge-edit">✏️ Отредактирован</span>`
        : `<span class="badge-new">⏳ Новый</span>`;

      let dayHeader = '';
      if (hasSchedule && post.scheduledFor !== lastDay) {
        lastDay = post.scheduledFor;
        dayHeader = `<div class="day-header">📅 ${formatDate(post.scheduledFor)}</div>`;
      }

      const btnLabel = hasSchedule
        ? `✅ Согласовано — выйдет в ${timeLabel}`
        : `✅ Согласовано`;

      return `${dayHeader}
      <div class="post-card" id="card-${i}">
        <div class="card-top">
          <div>
            <div class="card-num">${hasSchedule ? `<span class="slot-time">${timeLabel}</span>` : `Пост ${ri+1}`}</div>
            <div class="card-date">${hasSchedule ? formatDate(post.scheduledFor) : (post.date||'')}</div>
          </div>
          ${badge}
        </div>

        <div class="post-text" id="text-${i}" contenteditable="false">${esc(text)}</div>

        <div class="card-actions">
          <div class="edit-row">
            <button class="btn btn-edit" onclick="startEdit(${i})">✏️ Редактировать</button>
            <button class="btn btn-save" id="save-${i}" onclick="saveEdit(${i})">💾 Сохранить изменения</button>
          </div>
          <div class="media-row">
            <span class="media-label">📷 Фото/видео:</span>
            <input class="media-input" id="img-${i}" type="url"
              value="${esc(post.imageUrl||'')}"
              placeholder="https://yanatimeclock365.github.io/timeclock365-landings/images/banner.jpg" />
          </div>
          ${post.imageUrl ? `<div style="margin-top:-4px;cursor:zoom-in;" onclick="openLightbox('${esc(post.imageUrl)}')"><img src="${esc(post.imageUrl)}" style="width:100%;max-height:180px;object-fit:cover;border-radius:8px;border:1px solid #e0e8f5;" onerror="this.style.display='none'"/><div style="text-align:center;font-size:11px;color:#aaa;margin-top:4px;">🔍 Нажми чтобы открыть полностью</div></div>` : ''}
          <button class="btn btn-approve" id="btn-${i}" onclick="approve(${i})">
            ${btnLabel}
          </button>
        </div>

        <div style="padding:10px 20px 16px;font-size:12px;color:#0A66C2;border-top:1px solid #f0f4ff;">
          🔗 <a href="https://timeclock365.com/" target="_blank" style="color:#0A66C2;text-decoration:none;font-weight:600;">timeclock365.com</a>
          <span style="color:#aaa;margin-left:6px;">— ссылка добавляется к посту автоматически</span>
        </div>
      </div>`;
    }).join('');
  }

  // Запланированные (одобрены, ждут публикации)
  const schedEl = document.getElementById('sched-list');
  const schedSection = document.getElementById('sched-section');
  if (scheduled.length) {
    schedSection.style.display = 'block';
    schedEl.innerHTML = scheduled.map((post, ri) => `
      <div class="done-card">
        <div>
          <div class="done-title">${post.slot ? slotLabel(post.slot) : ''} · ${formatDate(post.scheduledFor) || post.date || ''}</div>
          <div class="done-meta">Выйдет автоматически в ${slotLabel(post.slot)}</div>
        </div>
        <span class="badge-sched">⏰ Запланирован</span>
      </div>`).join('');
  } else {
    schedSection.style.display = 'none';
  }

  // Done section
  const doneEl = document.getElementById('done-list');
  const doneSection = document.getElementById('done-section');
  if (done.length) {
    doneSection.style.display = 'block';
    doneEl.innerHTML = done.map((post, ri) => `
      <div class="done-card">
        <div>
          <div class="done-title">${post.slot ? slotLabel(post.slot) + ' · ' : ''}${formatDate(post.scheduledFor) || post.date || ''}</div>
          <div class="done-meta">${post.publishedAt ? 'Опубликован: ' + new Date(post.publishedAt).toLocaleString('ru') : 'Одобрен'}</div>
        </div>
        <span class="badge-ok">✓ Опубликован</span>
      </div>`).join('');
  } else {
    doneSection.style.display = 'none';
  }

  // ОТЧЁТЫ
  const reportsEl = document.getElementById('reports-list');
  if (!data.reports.length) {
    reportsEl.innerHTML = `<div class="empty"><h2>Отчётов нет</h2><p>Агенты генерируют отчёты каждый понедельник в 9:00</p></div>`;
  } else {
    // Сортируем: сначала свежие
    const sorted = [...data.reports].sort((a,b) => (b.date||'').localeCompare(a.date||''));
    reportsEl.innerHTML = sorted.map(r => {
      const label = REPORT_LABELS[r._type] || r._type;
      const bodyText = r.content || r.summary || r.text || JSON.stringify(r, null, 2);
      return `<div class="report-card">
        <div class="report-card-top">
          <div>
            <div class="report-type">${label}</div>
            <div class="report-date">${r.date || ''}</div>
          </div>
        </div>
        <div class="report-body">${esc(bodyText)}</div>
      </div>`;
    }).join('');
  }

  // РАССЫЛКА
  const emailsEl = document.getElementById('emails-list');
  if (!data.emails.length) {
    emailsEl.innerHTML = `<div class="empty"><h2>Писем нет</h2><p>Агент генерирует письма для прогрева лидов автоматически</p></div>`;
  } else {
    emailsEl.innerHTML = data.emails.map((e, i) => {
      const subject = e.subject || e.title || `Письмо ${i+1}`;
      const body = e.body || e.content || e.text || '';
      const delay = e.delay_days != null ? `День ${e.delay_days}` : (e.sendAfterDays != null ? `День ${e.sendAfterDays}` : '');
      return `<div class="email-card">
        <div class="email-card-top">
          <div>
            <div class="email-num">${delay ? delay + ' — ' : ''}${esc(subject)}</div>
          </div>
          <span class="email-badge">${e.status === 'active' ? '✓ Активно' : e.status || 'Шаблон'}</span>
        </div>
        <div class="email-body">${esc(body)}</div>
      </div>`;
    }).join('');
  }
}

function startEdit(i) {
  const el = document.getElementById(`text-${i}`);
  el.contentEditable = 'true';
  el.focus();
  // Move cursor to end
  const range = document.createRange();
  range.selectNodeContents(el);
  range.collapse(false);
  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);
  document.getElementById(`save-${i}`).style.display = 'inline-block';
}

async function saveEdit(i) {
  const el = document.getElementById(`text-${i}`);
  const txt = el.innerText;
  el.contentEditable = 'false';
  document.getElementById(`save-${i}`).style.display = 'none';
  await fetch('/approve', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ type:'posts', index: i, status:'edited', editedContent: txt, approvedAt: new Date().toISOString() })
  });
  toast('💾 Сохранено!');
  await load();
}

async function approve(i) {
  const btn = document.getElementById(`btn-${i}`);
  const imageUrl = document.getElementById(`img-${i}`)?.value.trim() || '';
  const textEl = document.getElementById(`text-${i}`);
  const editedContent = textEl?.innerText || '';
  const post = data.posts[i];
  const hasSchedule = post && post.scheduledFor && post.slot;

  btn.disabled = true;
  btn.textContent = '⏳ Сохраняем...';

  // Если у поста есть расписание — одобряем со статусом 'scheduled' (публикуется в 12:00/16:00)
  const status = hasSchedule ? 'scheduled' : 'approved';

  try {
    const res = await fetch('/approve', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        type: 'posts', index: i, status,
        editedContent, approvedAt: new Date().toISOString(),
        imageUrl: imageUrl || undefined
      })
    });
    const result = await res.json();
    if (hasSchedule) {
      const timeLabel = post.slot === 'noon' ? '12:00' : '16:00';
      toast(`✅ Согласовано! Выйдет в ${timeLabel}`);
      document.getElementById(`card-${i}`).classList.add('done');
    } else if (result.linkedIn?.ok) {
      toast('✅ Пост опубликован в LinkedIn!');
      document.getElementById(`card-${i}`).classList.add('done');
    } else {
      toast('⚠️ LinkedIn: ' + (result.linkedIn?.reason || JSON.stringify(result.linkedIn)));
      btn.disabled = false;
      btn.innerHTML = '✅ Согласовано';
    }
  } catch(e) {
    toast('❌ Ошибка: ' + e.message);
    btn.disabled = false;
    btn.innerHTML = '✅ Согласовано';
  }
  await load();
}


function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3500);
}

// Автообновление каждые 60 секунд
load();
setInterval(load, 60000);

function openLightbox(url) {
  const lb = document.getElementById('lightbox');
  document.getElementById('lightbox-img').src = url;
  lb.style.display = 'flex';
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  document.getElementById('lightbox').style.display = 'none';
  document.body.style.overflow = '';
}

// Закрыть по Escape
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });
</script>
